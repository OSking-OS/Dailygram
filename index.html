<style>
:root{
  --db-ink:#0B2239; --db-deep:#0D47A1; --db-blue:#1565C0; --db-sky:#29B6F6; --db-sky-light:#81D4FA;
  --db-ice:#EFF8FF; --db-white:#FFFFFF; --db-border:#DCEEFB; --db-muted:#5B7A93; --db-danger:#E5484D;
  --radius:14px; --radius-lg:22px;
  --shadow-sm:0 1px 3px rgba(13,71,161,.10); --shadow-md:0 10px 30px rgba(13,71,161,.14);
  --gradient-brand:linear-gradient(135deg,#0D47A1 0%,#1565C0 35%,#29B6F6 75%,#81D4FA 100%);
  --gradient-ring:conic-gradient(from 180deg,#0D47A1,#1976D2,#29B6F6,#81D4FA,#0D47A1);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--db-ice);color:var(--db-ink);-webkit-font-smoothing:antialiased;}
h1,h2,h3,.brand-word,.display{font-family:'Poppins',sans-serif;}
button{font-family:inherit;cursor:pointer;}
a{color:inherit;text-decoration:none;}
img{display:block;max-width:100%;}
.hidden{display:none !important;}
::selection{background:var(--db-sky-light);}
input,textarea{font-family:inherit;}
::placeholder{color:#9FBBD0;}
button:focus-visible,input:focus-visible,textarea:focus-visible,[tabindex]:focus-visible{outline:3px solid var(--db-sky-light);outline-offset:2px;}
.scrollbar-thin::-webkit-scrollbar{width:6px;height:6px;}
.scrollbar-thin::-webkit-scrollbar-thumb{background:var(--db-border);border-radius:10px;}

.brand-mark{width:34px;height:34px;border-radius:11px;overflow:hidden;flex-shrink:0;box-shadow:var(--shadow-sm);background:#fff;}
.brand-mark img{width:100%;height:100%;object-fit:cover;}
.brand-row{display:flex;align-items:center;gap:10px;}
.brand-word{font-weight:800;font-size:22px;letter-spacing:-0.02em;background:var(--gradient-brand);-webkit-background-clip:text;background-clip:text;color:transparent;}

/* ---------- Loading screen ---------- */
#loadingScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--db-ice);}
#loadingScreen .brand-mark{width:64px;height:64px;border-radius:18px;}
.spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--db-border);border-top-color:var(--db-blue);animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loadingScreen p{color:var(--db-muted);font-size:13.5px;}

/* ---------- Language gate ---------- */
#langGateScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 20% 15%,#E3F4FF 0%,var(--db-ice) 55%),var(--db-ice);padding:24px;}
.lang-card{width:100%;max-width:420px;background:var(--db-white);border:1px solid var(--db-border);border-radius:var(--radius-lg);padding:34px 28px;box-shadow:var(--shadow-md);text-align:center;}
.lang-card .brand-row{justify-content:center;margin-bottom:14px;}
.lang-card .brand-mark{width:50px;height:50px;border-radius:15px;}
.lang-card h2{font-size:19px;margin:6px 0 4px;}
.lang-card p{color:var(--db-muted);font-size:13.5px;margin:0 0 20px;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.lang-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--db-border);border-radius:12px;background:var(--db-ice);font-weight:600;font-size:14px;color:var(--db-ink);}
.lang-btn span.flag{font-size:18px;}
.lang-btn.selected{border-color:var(--db-sky);background:#E3F4FF;}

/* ---------- Auth screen ---------- */
#authScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 20% 15%,#E3F4FF 0%,var(--db-ice) 55%),var(--db-ice);padding:24px;}
.auth-card{width:100%;max-width:380px;background:var(--db-white);border:1px solid var(--db-border);border-radius:var(--radius-lg);padding:36px 30px 26px;box-shadow:var(--shadow-md);text-align:center;}
.auth-card .brand-row{justify-content:center;margin-bottom:6px;}
.auth-card .brand-mark{width:46px;height:46px;border-radius:14px;}
.auth-card .brand-word{font-size:30px;}
.auth-tagline{color:var(--db-muted);font-size:14px;margin:4px 0 22px;}
.auth-field{margin-bottom:12px;text-align:left;}
.auth-field label{font-size:12px;font-weight:600;color:var(--db-muted);display:block;margin:0 0 5px 2px;}
.auth-field input,.auth-field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--db-border);border-radius:10px;font-size:14px;background:var(--db-ice);color:var(--db-ink);}
.auth-field input:focus,.auth-field textarea:focus{border-color:var(--db-sky);background:var(--db-white);}
.avatar-pick-row{display:flex;gap:10px;justify-content:center;margin:8px 0 16px;flex-wrap:wrap;}
.avatar-pick{width:54px;height:54px;border-radius:50%;border:3px solid transparent;cursor:pointer;overflow:hidden;}
.avatar-pick img{width:100%;height:100%;object-fit:cover;}
.avatar-pick.selected{border-color:var(--db-sky);}
.avatar-pick.upload-pick{display:flex;align-items:center;justify-content:center;background:var(--db-ice);border:2px dashed var(--db-border);color:var(--db-muted);}
.btn-primary{width:100%;padding:12px;border:none;border-radius:10px;background:var(--gradient-brand);color:#fff;font-weight:700;font-size:14.5px;margin-top:6px;box-shadow:var(--shadow-sm);transition:transform .12s ease, opacity .15s ease;}
.btn-primary:hover{opacity:.92;}
.btn-primary:active{transform:scale(.98);}
.btn-primary:disabled{opacity:.5;cursor:default;}
.auth-switch{font-size:13.5px;color:var(--db-muted);margin-top:18px;}
.auth-switch b{color:var(--db-blue);cursor:pointer;}
.auth-link-row{display:flex;justify-content:space-between;margin-top:10px;}
.auth-link-row span{font-size:12.5px;color:var(--db-muted);cursor:pointer;}

/* ---------- App shell layout ---------- */
#appShell{min-height:100vh;}
.topbar{position:fixed;top:0;left:0;right:0;height:58px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--db-border);display:flex;align-items:center;justify-content:space-between;padding:0 18px;z-index:100;}
.search-wrap{position:relative;flex:1;max-width:280px;margin:0 18px;}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;border-radius:20px;border:1.5px solid var(--db-border);background:var(--db-ice);font-size:13.5px;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--db-muted);}
.search-results{position:absolute;top:42px;left:0;right:0;background:var(--db-white);border:1px solid var(--db-border);border-radius:12px;box-shadow:var(--shadow-md);max-height:280px;overflow:auto;z-index:50;}
.search-result-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;}
.search-result-item:hover{background:var(--db-ice);}
.search-result-item img{width:34px;height:34px;border-radius:50%;object-fit:cover;}
.topbar-icons{display:flex;align-items:center;gap:6px;}
.icon-btn{width:38px;height:38px;border:none;background:transparent;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--db-ink);position:relative;}
.icon-btn:hover{background:var(--db-ice);}
.icon-btn svg{width:22px;height:22px;}
.icon-btn.active{color:var(--db-blue);}
.badge-dot{position:absolute;top:5px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--db-sky);border:2px solid #fff;}
.topbar-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid transparent;cursor:pointer;}
.topbar-avatar.active{border-color:var(--db-sky);}

.layout{display:flex;max-width:1080px;margin:0 auto;padding-top:58px;}
.sidebar-left{width:84px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;padding:22px 0;position:sticky;top:58px;height:calc(100vh - 58px);}
.sidebar-left .nav-item{width:54px;height:48px;border:none;background:transparent;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--db-muted);}
.sidebar-left .nav-item svg{width:22px;height:22px;}
.sidebar-left .nav-item span{font-size:9.5px;font-weight:600;}
.sidebar-left .nav-item.active{color:var(--db-blue);background:var(--db-ice);}
.sidebar-left .nav-item:hover{background:var(--db-ice);}
.sidebar-left .nav-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;}
.sidebar-left .nav-item.active .nav-avatar{box-shadow:0 0 0 2px var(--db-sky);}

main{flex:1;min-width:0;padding:18px 14px 80px;}
.page{display:none;}
.page.active{display:block;}

/* ---------- Stories ---------- */
.stories-row{display:flex;gap:14px;overflow-x:auto;padding:6px 2px 16px;margin-bottom:6px;}
.story-item{display:flex;flex-direction:column;align-items:center;gap:5px;width:64px;flex-shrink:0;cursor:pointer;}
.story-ring{width:60px;height:60px;border-radius:50%;background:var(--gradient-ring);display:flex;align-items:center;justify-content:center;padding:2.5px;}
.story-ring.seen,.story-ring.self{background:var(--db-border);}
.story-ring-inner{width:100%;height:100%;border-radius:50%;border:2.5px solid var(--db-white);overflow:hidden;background:#fff;position:relative;}
.story-ring-inner img{width:100%;height:100%;object-fit:cover;}
.story-add-badge{position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;background:var(--db-blue);border:2px solid #fff;color:#fff;display:flex;align-items:center;justify-content:center;}
.story-add-badge svg{width:10px;height:10px;}
.story-item span{font-size:11.5px;color:var(--db-ink);max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ---------- Feed ---------- */
.feed-layout{display:flex;gap:28px;align-items:flex-start;}
.feed-col{flex:1;min-width:0;max-width:470px;margin:0 auto;}
.suggestions-col{width:300px;flex-shrink:0;padding-top:8px;}
@media (max-width:980px){.suggestions-col{display:none;}}
.empty-state{text-align:center;padding:70px 20px;color:var(--db-muted);}
.empty-state svg{width:54px;height:54px;color:var(--db-border);margin-bottom:14px;}
.empty-state h3{color:var(--db-ink);font-size:16px;margin:0 0 6px;}
.empty-state p{font-size:13.5px;margin:0 0 16px;}

.post-card{background:var(--db-white);border:1px solid var(--db-border);border-radius:var(--radius-lg);margin-bottom:18px;overflow:hidden;box-shadow:var(--shadow-sm);}
.post-head{display:flex;align-items:center;gap:10px;padding:12px 14px;}
.post-head img{width:36px;height:36px;border-radius:50%;object-fit:cover;cursor:pointer;}
.post-head .who{flex:1;min-width:0;cursor:pointer;}
.post-head .who b{font-size:13.5px;display:block;}
.post-head .who small{color:var(--db-muted);font-size:11.5px;}
.post-more{background:none;border:none;color:var(--db-muted);padding:6px;}
.post-more svg{width:18px;height:18px;}
.post-media{width:100%;background:var(--db-ice);position:relative;cursor:pointer;}
.post-media img{width:100%;display:block;max-height:560px;object-fit:cover;}
.like-burst{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:90px;height:90px;color:#fff;opacity:0;pointer-events:none;filter:drop-shadow(0 4px 14px rgba(0,0,0,.25));}
.like-burst.animate{animation:burst .75s ease forwards;}
@keyframes burst{0%{transform:translate(-50%,-50%) scale(0);opacity:0;}25%{transform:translate(-50%,-50%) scale(1.15);opacity:1;}55%{transform:translate(-50%,-50%) scale(.95);opacity:1;}100%{transform:translate(-50%,-50%) scale(.9);opacity:0;}}
.post-actions{display:flex;align-items:center;padding:10px 12px 2px;gap:4px;}
.post-actions .icon-btn{width:36px;height:36px;}
.post-actions .icon-btn svg{width:23px;height:23px;}
.post-actions .spacer{flex:1;}
.liked-heart{color:var(--db-sky) !important;}
.saved-bookmark{color:var(--db-blue) !important;}
.post-likes{padding:0 14px;font-size:13px;font-weight:600;}
.post-caption{padding:5px 14px 2px;font-size:13.5px;line-height:1.45;}
.post-caption b{margin-right:6px;}
.post-comments-preview{padding:2px 14px;font-size:13px;color:var(--db-muted);cursor:pointer;}
.post-comment-row{padding:2px 14px;font-size:13px;}
.post-time{padding:6px 14px 0;font-size:11px;color:var(--db-muted);text-transform:uppercase;letter-spacing:.03em;}
.post-comment-form{display:flex;align-items:center;border-top:1px solid var(--db-border);margin-top:8px;padding:4px 8px;}
.post-comment-form input{flex:1;border:none;padding:10px 8px;font-size:13.5px;background:transparent;}
.post-comment-form button{border:none;background:none;color:var(--db-blue);font-weight:700;font-size:13px;padding:8px 10px;opacity:.4;}
.post-comment-form button.enabled{opacity:1;}

.suggestion-box{background:var(--db-white);border:1px solid var(--db-border);border-radius:var(--radius);padding:14px;}
.suggestion-box h4{font-size:13px;color:var(--db-muted);margin:0 0 12px;font-weight:600;}
.suggestion-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.suggestion-row img{width:38px;height:38px;border-radius:50%;object-fit:cover;cursor:pointer;}
.suggestion-row .who{flex:1;min-width:0;cursor:pointer;}
.suggestion-row .who b{font-size:13px;display:block;}
.suggestion-row .who small{color:var(--db-muted);font-size:11px;}
.follow-btn{border:none;background:none;color:var(--db-blue);font-weight:700;font-size:12px;}
.footer-note{color:var(--db-muted);font-size:11.5px;margin-top:20px;line-height:1.7;}

.pill-btn{padding:7px 16px;border-radius:8px;border:none;font-weight:700;font-size:13px;cursor:pointer;}
.pill-btn.primary{background:var(--gradient-brand);color:#fff;}
.pill-btn.ghost{background:var(--db-ice);color:var(--db-ink);border:1px solid var(--db-border);}
.pill-btn.disabled-hint{background:var(--db-ice);color:var(--db-muted);border:1px solid var(--db-border);cursor:help;}

/* ---------- Explore ---------- */
.explore-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:900px;margin:0 auto;}
.explore-cell{position:relative;aspect-ratio:1/1;overflow:hidden;border-radius:6px;cursor:pointer;background:var(--db-border);}
.explore-cell img{width:100%;height:100%;object-fit:cover;transition:transform .25s;}
.explore-cell:hover img{transform:scale(1.04);}
.explore-cell .overlay{position:absolute;inset:0;background:rgba(13,40,80,0);display:flex;align-items:center;justify-content:center;color:#fff;gap:16px;opacity:0;transition:opacity .2s;font-weight:700;font-size:13px;}
.explore-cell:hover .overlay{opacity:1;background:rgba(13,40,80,.32);}
.overlay span{display:flex;align-items:center;gap:5px;}
.overlay svg{width:16px;height:16px;}

/* ---------- Reels ---------- */
.reels-wrap{max-width:380px;margin:0 auto;height:calc(100vh - 110px);overflow-y:auto;scroll-snap-type:y mandatory;border-radius:var(--radius-lg);}
.reel-card{scroll-snap-align:start;height:calc(100vh - 110px);border-radius:var(--radius-lg);overflow:hidden;position:relative;margin-bottom:14px;background:#021024;display:flex;align-items:center;justify-content:center;}
.reel-card img{width:100%;height:100%;object-fit:cover;opacity:.92;}
.reel-playbtn{position:absolute;width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#fff;backdrop-filter:blur(2px);}
.reel-playbtn svg{width:28px;height:28px;}
.reel-side-actions{position:absolute;right:10px;bottom:90px;display:flex;flex-direction:column;align-items:center;gap:18px;color:#fff;}
.reel-side-actions button{background:none;border:none;color:#fff;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:600;}
.reel-side-actions svg{width:26px;height:26px;}
.reel-info{position:absolute;left:14px;bottom:18px;right:70px;color:#fff;}
.reel-info .who{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.reel-info img{width:30px;height:30px;border-radius:50%;object-fit:cover;border:1.5px solid #fff;}
.reel-info b{font-size:13.5px;}
.reel-info p{font-size:12.5px;margin:0;opacity:.92;}

/* ---------- Notifications ---------- */
.notif-section-title{font-size:13px;font-weight:700;color:var(--db-muted);margin:18px 4px 8px;}
.notif-row{display:flex;align-items:center;gap:12px;padding:9px 6px;border-radius:10px;cursor:pointer;}
.notif-row:hover{background:var(--db-white);}
.notif-row img{width:42px;height:42px;border-radius:50%;object-fit:cover;}
.notif-row .txt{flex:1;font-size:13.5px;line-height:1.4;}
.notif-row .txt small{display:block;color:var(--db-muted);font-size:11px;margin-top:2px;}
.notif-thumb{width:42px;height:42px;border-radius:6px;object-fit:cover;}

/* ---------- Messages ---------- */
.messages-layout{display:flex;height:calc(100vh - 90px);border:1px solid var(--db-border);border-radius:var(--radius-lg);background:var(--db-white);overflow:hidden;}
.conv-list{width:300px;flex-shrink:0;border-right:1px solid var(--db-border);overflow-y:auto;}
.conv-list h3{padding:16px 16px 6px;font-size:16px;}
.conv-row{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;}
.conv-row:hover,.conv-row.active{background:var(--db-ice);}
.conv-row img{width:46px;height:46px;border-radius:50%;object-fit:cover;}
.conv-row .who{flex:1;min-width:0;}
.conv-row .who b{font-size:13.5px;display:block;}
.conv-row .who small{font-size:12px;color:var(--db-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:190px;}
.chat-pane{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-head{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--db-border);}
.chat-head img{width:36px;height:36px;border-radius:50%;object-fit:cover;}
.chat-head .back-btn{display:none;background:none;border:none;color:var(--db-ink);}
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;}
.chat-bubble{max-width:68%;padding:9px 13px;border-radius:16px;font-size:13.5px;line-height:1.4;}
.chat-bubble.them{align-self:flex-start;background:var(--db-ice);border:1px solid var(--db-border);}
.chat-bubble.me{align-self:flex-end;background:var(--gradient-brand);color:#fff;}
.chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--db-border);}
.chat-input-row input{flex:1;border:1.5px solid var(--db-border);border-radius:20px;padding:10px 16px;font-size:13.5px;background:var(--db-ice);}
.chat-input-row button{border:none;background:var(--gradient-brand);color:#fff;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.chat-input-row button svg{width:18px;height:18px;}
.no-conv-selected{flex:1;display:flex;align-items:center;justify-content:center;color:var(--db-muted);font-size:13.5px;text-align:center;padding:20px;}
@media(max-width:760px){
  .conv-list{position:absolute;inset:0;z-index:5;width:100%;background:#fff;}
  .conv-list.hide-mobile{display:none;}
  .chat-pane.hide-mobile{display:none;}
  .chat-head .back-btn{display:flex;}
}

/* ---------- Profile ---------- */
.profile-head{display:flex;gap:34px;padding:14px 4px 10px;align-items:center;flex-wrap:wrap;}
.profile-head img.avatar-big{width:110px;height:110px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.profile-meta{flex:1;min-width:200px;}
.profile-top-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
.profile-top-row h2{font-size:20px;margin:0;font-weight:600;}
.profile-stats{display:flex;gap:26px;margin-bottom:12px;}
.profile-stats div{font-size:13.5px;}
.profile-stats b{display:block;font-size:16px;}
.profile-bio b{display:block;font-size:13.5px;}
.profile-bio div{font-size:13.5px;color:var(--db-ink);margin-top:2px;line-height:1.4;}
.profile-tabs{display:flex;justify-content:center;gap:40px;border-top:1px solid var(--db-border);margin-top:18px;}
.profile-tab{padding:13px 4px;background:none;border:none;font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--db-muted);display:flex;align-items:center;gap:6px;border-top:2px solid transparent;margin-top:-1px;}
.profile-tab svg{width:14px;height:14px;}
.profile-tab.active{color:var(--db-ink);border-top-color:var(--db-ink);}
.profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:14px;}
.profile-empty{text-align:center;color:var(--db-muted);padding:60px 20px;font-size:13.5px;}
.profile-empty svg{width:48px;height:48px;margin-bottom:10px;color:var(--db-border);}

/* ---------- Bottom mobile nav ---------- */
.bottombar{display:none;position:fixed;bottom:0;left:0;right:0;height:54px;background:rgba(255,255,255,.97);border-top:1px solid var(--db-border);z-index:90;align-items:center;justify-content:space-around;}
.bottombar button{background:none;border:none;color:var(--db-muted);display:flex;align-items:center;justify-content:center;}
.bottombar button.active{color:var(--db-blue);}
.bottombar button svg{width:23px;height:23px;}
.bottombar img{width:24px;height:24px;border-radius:50%;object-fit:cover;}
@media(max-width:760px){
  .sidebar-left{display:none;}
  .bottombar{display:flex;}
  main{padding-bottom:70px;}
  .layout{padding-top:54px;}
}

/* ---------- Modals ---------- */
.modal-overlay{position:fixed;inset:0;background:rgba(8,28,54,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal-box{background:var(--db-white);border-radius:var(--radius-lg);max-width:420px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-md);}
.modal-box.wide{max-width:760px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--db-border);}
.modal-head h3{margin:0;font-size:15px;}
.modal-head button{background:none;border:none;color:var(--db-muted);padding:4px;}
.modal-head button svg{width:20px;height:20px;}
.modal-body{padding:16px;}
.upload-zone{border:2px dashed var(--db-border);border-radius:var(--radius);padding:34px 14px;text-align:center;color:var(--db-muted);cursor:pointer;font-size:13.5px;}
.upload-zone svg{width:40px;height:40px;margin-bottom:8px;color:var(--db-sky);}
.preview-img{width:100%;border-radius:var(--radius);max-height:340px;object-fit:cover;margin-bottom:12px;}
textarea.cap-input{width:100%;border:1.5px solid var(--db-border);border-radius:10px;padding:10px;font-size:13.5px;min-height:70px;background:var(--db-ice);resize:vertical;}
.post-detail{display:flex;min-height:420px;}
.post-detail .media-side{flex:1.2;background:#021024;display:flex;align-items:center;}
.post-detail .media-side img{width:100%;}
.post-detail .info-side{flex:1;display:flex;flex-direction:column;min-width:260px;}
.post-detail .comments-scroll{flex:1;overflow-y:auto;padding:12px 14px;}
@media(max-width:680px){.post-detail{flex-direction:column;}.post-detail .media-side{max-height:300px;}}
#modalStoryViewer .modal-box{background:transparent;box-shadow:none;max-width:420px;}
.story-viewer-card{position:relative;background:#021024;border-radius:var(--radius-lg);overflow:hidden;aspect-ratio:9/16;max-height:80vh;}
.story-viewer-card img{width:100%;height:100%;object-fit:cover;}
.story-progress-row{position:absolute;top:8px;left:8px;right:8px;display:flex;gap:4px;}
.story-progress-bar{flex:1;height:3px;background:rgba(255,255,255,.35);border-radius:3px;overflow:hidden;}
.story-progress-fill{height:100%;width:0%;background:#fff;}
.story-viewer-head{position:absolute;top:16px;left:10px;right:10px;display:flex;align-items:center;gap:8px;color:#fff;}
.story-viewer-head img{width:28px;height:28px;border-radius:50%;border:1.5px solid #fff;object-fit:cover;}
.story-viewer-head b{font-size:13px;}
.story-close-btn{position:absolute;top:14px;right:10px;background:none;border:none;color:#fff;}
.story-close-btn svg{width:22px;height:22px;}
.story-tap-l,.story-tap-r{position:absolute;top:0;bottom:0;width:50%;}
.story-tap-l{left:0;}.story-tap-r{right:0;}

#toastContainer{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:400;display:flex;flex-direction:column;gap:8px;align-items:center;}
.toast{background:var(--db-ink);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;box-shadow:var(--shadow-md);opacity:0;transform:translateY(10px);transition:all .25s;max-width:80vw;text-align:center;}
.toast.show{opacity:1;transform:translateY(0);}
.bg-flourish{position:fixed;width:380px;height:380px;border-radius:50%;background:var(--gradient-brand);opacity:.07;filter:blur(40px);z-index:-1;}
.bg-flourish.one{top:-120px;left:-120px;}
.bg-flourish.two{bottom:-140px;right:-140px;}

/* settings modal */
.settings-section{margin-bottom:18px;}
.settings-section h4{font-size:12px;color:var(--db-muted);text-transform:uppercase;letter-spacing:.04em;margin:0 0 10px;}
.lang-grid.compact{grid-template-columns:1fr 1fr;}
.btn-danger-ghost{width:100%;padding:11px;border:1.5px solid #FBD3D3;border-radius:10px;background:#FFF5F5;color:var(--db-danger);font-weight:700;font-size:14px;}
</style>
</head>
<body>

<div class="bg-flourish one"></div>
<div class="bg-flourish two"></div>

let currentLang = localStorage.getItem('dailygram_lang') || null;
function t(key, vars){
  const dict = LANG[currentLang] || LANG.it;
  let str = dict[key] != null ? dict[key] : (LANG.it[key] || key);
  if(vars) Object.keys(vars).forEach(k => { str = str.replace('{'+k+'}', vars[k]); });
  return str;
}
function applyLanguage(){
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.dataset.i18nPlaceholder); });
  document.documentElement.lang = currentLang || 'it';
}

function uid(p){ return (p||'id')+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function relTime(ts){
  const diff = Math.max(0, Date.now()-ts);
  const m = Math.floor(diff/60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
  if(m < 1) return t('justNow') || 'adesso';
  if(m < 60) return m+' min';
  if(h < 24) return h+' h';
  if(d < 7) return d+' g';
  return new Date(ts).toLocaleDateString();
}
function toast(msg){
  const c = document.getElementById('toastContainer');
  const elt = document.createElement('div'); elt.className='toast'; elt.textContent = msg;
  c.appendChild(elt); requestAnimationFrame(()=>elt.classList.add('show'));
  setTimeout(()=>{ elt.classList.remove('show'); setTimeout(()=>elt.remove(),300); }, 2600);
}

    img.onload = () => {
      let {width:w, height:h} = img;
      if(w > h && w > maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
      else if(h >= w && h > maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function doSignup(){

  const password = document.getElementById('signupPassword').value;
  const bio = document.getElementById('signupBio').value.trim();

      avatar, following: [], followers: [], createdAt: Date.now()
    });

/* ---------------- Session lifecycle ---------------- */
async function startSession(uid){
  stopSession();
  await new Promise(resolve => {
    unsubMe = dbFs.collection('users').doc(uid).onSnapshot(snap => {
      if(!snap.exists) return;
      me = snap.data();
      userCache[me.uid] = me;
      refreshChromeAvatars();
      if(currentPage === 'profile' && activeProfileUid === me.uid) renderProfile();
      renderProfileMiniCard();
      renderSuggestions();
      if(currentPage === 'feed') renderFeed();
      if(currentPage === 'messages') renderMessagesList();
      resolve();
    });
  });
  unsubPosts = dbFs.collection('posts').orderBy('ts','desc').limit(300).onSnapshot(snap => {
    allPosts = snap.docs.map(d => ({id:d.id, ...d.data()}));
    renderCurrentPageData();
  }, err => console.error('posts listener', err));
  unsubNotifs = dbFs.collection('users').doc(uid).collection('notifications').orderBy('ts','desc').limit(60).onSnapshot(snap => {
    myNotifications = snap.docs.map(d => ({id:d.id, ...d.data()}));
    updateNotifBadge();
    if(currentPage === 'notifications') renderNotifications();
  }, err => console.error('notif listener', err));
  unsubConvs = dbFs.collection('conversations').where('participants','array-contains', uid).onSnapshot(snap => {
    myConversations = snap.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b)=>(b.lastTs||0)-(a.lastTs||0));
    if(currentPage === 'messages') renderMessagesList();
  }, err => console.error('conv listener', err));
}
function stopSession(){
  [unsubMe, unsubPosts, unsubNotifs, unsubConvs, unsubActiveConv, unsubProfile].forEach(u => { if(u) u(); });
  unsubMe=unsubPosts=unsubNotifs=unsubConvs=unsubActiveConv=unsubProfile=null;
  me=null; allPosts=[]; myConversations=[]; myNotifications=[]; activeConvUid=null; activeConvMessages=[];
}

async function getUserCached(uid){
  if(userCache[uid]) return userCache[uid];
  const snap = await dbFs.collection('users').doc(uid).get();
  if(snap.exists){ userCache[uid] = snap.data(); return userCache[uid]; }
  return null;
}

async function toggleLike(postId){
  const post = findPost(postId); if(!post || !me) return;
  const liked = (post.likes||[]).includes(me.uid);
  await dbFs.collection('posts').doc(postId).update({ likes: liked ? FV.arrayRemove(me.uid) : FV.arrayUnion(me.uid) });
  if(!liked && post.authorUid !== me.uid){
    dbFs.collection('users').doc(post.authorUid).collection('notifications').add({
      type:'like', actorUid:me.uid, actorUsername:me.username, actorAvatar:me.avatar, postId, postThumb:post.image, ts:Date.now(), read:false
    }).catch(console.error);
  }
}
async function toggleSave(postId){
  if(!me) return;
  const saved = (me.saved||[]).includes(postId);

  await dbFs.collection('posts').doc(postId).update({ comments: FV.arrayUnion(comment) });

async function toggleFollow(targetUid){
  if(!me || targetUid===me.uid) return;
  const isFollowing = (me.following||[]).includes(targetUid);
  const batch = dbFs.batch();
  batch.update(dbFs.collection('users').doc(me.uid), {following: isFollowing ? FV.arrayRemove(targetUid) : FV.arrayUnion(targetUid)});
  batch.update(dbFs.collection('users').doc(targetUid), {followers: isFollowing ? FV.arrayRemove(me.uid) : FV.arrayUnion(me.uid)});
  await batch.commit();
  if(!isFollowing){
    dbFs.collection('users').doc(targetUid).collection('notifications').add({
      type:'follow', actorUid:me.uid, actorUsername:me.username, actorAvatar:me.avatar, ts:Date.now(), read:false

  const grid = document.getElementById('exploreGrid');
  if(!allPosts.length){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">${ICONS.emptyCam}<h3>${escapeHtml(t('exploreEmptyTitle'))}</h3><p>${escapeHtml(t('exploreEmptySubtitle'))}</p></div>`;
    return;
  }
  const sorted = allPosts.slice().sort((a,b)=>(b.likes||[]).length - (a.likes||[]).length);
  grid.innerHTML = sorted.map(p => `
    <div class="explore-cell" data-action="openPostDetail" data-post-id="${p.id}">
      <img src="${p.image}" loading="lazy">
      <div class="overlay"><span>${ICONS.heartFilled}${(p.likes||[]).length}</span><span>${ICONS.comment}${(p.comments||[]).length}</span></div>
    </div>`).join('');
}
function renderReels(){
  const wrap = document.getElementById('reelsWrap');
  if(!allPosts.length){
    wrap.innerHTML = `<div class="empty-state">${ICONS.emptyCam}<h3>${escapeHtml(t('reelsEmptyTitle'))}</h3><p>${escapeHtml(t('reelsEmptySubtitle'))}</p></div>`;
    return;
  }
  wrap.innerHTML = allPosts.slice(0,12).map(p=>{
    const liked = me && (p.likes||[]).includes(me.uid);
    const isSaved = me && (me.saved||[]).includes(p.id);
    return `
    <div class="reel-card">
      <img src="${p.image}">
      <div class="reel-playbtn">${ICONS.play}</div>
      <div class="reel-side-actions">
        <button data-action="toggleLike" data-post-id="${p.id}">${liked?ICONS.heartFilled:ICONS.heart}<span>${(p.likes||[]).length}</span></button>
        <button data-action="openPostDetail" data-post-id="${p.id}">${ICONS.comment}<span>${(p.comments||[]).length}</span></button>
        <button data-action="shareToast">${ICONS.share}<span></span></button>
        <button data-action="toggleSave" data-post-id="${p.id}">${isSaved?ICONS.bookmarkFilled:ICONS.bookmark}<span></span></button>
      </div>
      <div class="reel-info">
        <div class="who"><img src="${p.authorAvatar}"><b>@${escapeHtml(p.authorUsername)}</b></div>
        <p>${escapeHtml(p.caption||'')}</p>
      </div>
    </div>`;
  }).join('');
}

/* ---------------- Notifications ---------------- */
function updateNotifBadge(){
  document.getElementById('notifBadge').classList.toggle('hidden', !myNotifications.some(n=>!n.read));
}
function markNotificationsRead(){
  if(!me) return;
  const unread = myNotifications.filter(n=>!n.read);
  if(!unread.length) return;
  const batch = dbFs.batch();
  unread.forEach(n => batch.update(dbFs.collection('users').doc(me.uid).collection('notifications').doc(n.id), {read:true}));
  batch.commit().catch(console.error);
}
function renderNotifications(){
  const list = document.getElementById('notifList');
  const today = myNotifications.filter(n=> Date.now()-n.ts < 24*3600*1000);
  const earlier = myNotifications.filter(n=> Date.now()-n.ts >= 24*3600*1000);
  function rowHtml(n){
    let text = '';
    if(n.type==='follow') text = t('notifFollowText',{user:'@'+escapeHtml(n.actorUsername)});
    if(n.type==='like') text = t('notifLikeText',{user:'@'+escapeHtml(n.actorUsername)});
    if(n.type==='comment') text = t('notifCommentText',{user:'@'+escapeHtml(n.actorUsername), text:escapeHtml(n.text||'')});
    return `<div class="notif-row" data-action="goProfileFromEl" data-uid="${n.actorUid}">
      <img src="${n.actorAvatar}">
      <div class="txt">${text}<small>${relTime(n.ts)}</small></div>
      ${n.postThumb?`<img class="notif-thumb" src="${n.postThumb}">`:''}
    </div>`;
  }
  list.innerHTML =
    (today.length? `<div class="notif-section-title">${escapeHtml(t('notifToday'))}</div>${today.map(rowHtml).join('')}` : '') +
    (earlier.length? `<div class="notif-section-title">${escapeHtml(t('notifWeek'))}</div>${earlier.map(rowHtml).join('')}` : '') +
    (!today.length && !earlier.length ? `<div class="empty-state">${ICONS.heart}<p>${escapeHtml(t('notifEmpty'))}</p></div>` : '');
}

/* ---------------- Messages ---------------- */
function renderMessagesList(){
  const list = document.getElementById('convList');
  if(!myConversations.length){
    list.innerHTML = `<h3>${escapeHtml(t('messagesTitle'))}</h3><div class="empty-state">${ICONS.emptyInbox}<p>${escapeHtml(t('noConversationsYet'))}</p></div>`;
    return;
  }
  list.innerHTML = `<h3>${escapeHtml(t('messagesTitle'))}</h3>` + myConversations.map(c=>{
    const otherUid = c.participants.find(p=>p!==me.uid);
    const info = (c.participantInfo && c.participantInfo[otherUid]) || {username:'…', name:'…', avatar:''};
    return `<div class="conv-row ${activeConvUid===otherUid?'active':''}" data-action="openConversation" data-uid="${otherUid}">
      <img src="${info.avatar}">
      <div class="who"><b>${escapeHtml(info.name||info.username)}</b><small>${escapeHtml(c.lastMessage||'')}</small></div>
    </div>`;
  }).join('');
}
async function openConversationFromProfile(targetUid){ goPage('messages'); openConversation(targetUid); }
async function openConversation(targetUid){
  if(!me) return;
  activeConvUid = targetUid;
  renderMessagesList();
  if(unsubActiveConv) unsubActiveConv();
  activeConvUserCache = await getUserCached(targetUid);
  const convId = [me.uid, targetUid].sort().join('_');
  document.getElementById('convList').classList.add('hide-mobile');
  document.getElementById('chatPane').classList.remove('hide-mobile');
  renderConversation();
  unsubActiveConv = dbFs.collection('conversations').doc(convId).collection('messages').orderBy('ts','asc').limit(200)
    .onSnapshot(snap => { activeConvMessages = snap.docs.map(d=>({id:d.id,...d.data()})); renderConversation(); }, console.error);
}
function backToConvList(){
  document.getElementById('convList').classList.remove('hide-mobile');
  document.getElementById('chatPane').classList.add('hide-mobile');
}
function renderConversation(){
  const pane = document.getElementById('chatPane');
  if(!activeConvUid || !me){ pane.innerHTML = `<div class="no-conv-selected">${escapeHtml(t('selectConversation'))}</div>`; return; }
  const u = activeConvUserCache || {name:'…', username:'…', avatar:''};
  pane.innerHTML = `
    <div class="chat-head">
      <button class="back-btn" data-action="backToConvList">${ICONS.back}</button>
      <img src="${u.avatar}" data-action="goProfileFromEl" data-uid="${activeConvUid}">
      <div class="who" data-action="goProfileFromEl" data-uid="${activeConvUid}"><b>${escapeHtml(u.name||u.username)}</b><small style="color:var(--db-muted);">@${escapeHtml(u.username)}</small></div>
    </div>
    <div class="chat-body scrollbar-thin" id="chatBody">
      ${activeConvMessages.map(m=>`<div class="chat-bubble ${m.from===me.uid?'me':'them'}">${escapeHtml(m.text)}</div>`).join('')}
    </div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="${escapeHtml(t('messageInputPlaceholder'))}">
      <button data-action="sendMessage">${ICONS.send}</button>
    </div>`;
  const body = document.getElementById('chatBody'); body.scrollTop = body.scrollHeight;
  document.getElementById('chatInput').addEventListener('keydown', e=>{ if(e.key==='Enter') sendMessage(); });
}
async function sendMessage(){
  if(!me || !activeConvUid) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim(); if(!text) return;
  input.value = '';
  const convId = [me.uid, activeConvUid].sort().join('_');
  const convRef = dbFs.collection('conversations').doc(convId);
  await convRef.set({
    participants: [me.uid, activeConvUid].sort(),
    participantInfo: {
      [me.uid]: {username:me.username, name:me.name, avatar:me.avatar},
      [activeConvUid]: {username:activeConvUserCache.username, name:activeConvUserCache.name, avatar:activeConvUserCache.avatar}
    },
    lastMessage:text, lastTs:Date.now(), lastFrom:me.uid
  }, {merge:true});
  await convRef.collection('messages').add({from: me.uid, text, ts: Date.now()});
}

/* ---------------- Profile ---------------- */
function goProfileFromEl(uidAttr){ goPage('profile', uidAttr === '' ? me.uid : uidAttr); }
function attachProfileListener(profileUid){
  if(unsubProfile) unsubProfile();
  unsubProfile = dbFs.collection('users').doc(profileUid).onSnapshot(snap => {
    if(snap.exists){ userCache[profileUid] = snap.data(); if(currentPage==='profile' && activeProfileUid===profileUid) renderProfile(); }
  });
}
function setProfileTab(tabName){ activeProfileTab = tabName; renderProfile(); }
function renderProfile(){
  const targetUid = activeProfileUid || (me ? me.uid : null);
  const u = userCache[targetUid];
  if(!u){ document.getElementById('profileContent').innerHTML = ''; return; }
  const isYou = me && targetUid === me.uid;
  const isFollowing = me && (me.following||[]).includes(targetUid);
  const userPosts = allPosts.filter(p => p.authorUid === targetUid);
  const savedPosts = isYou ? allPosts.filter(p => (me.saved||[]).includes(p.id)) : [];
  const tabsHtml = `<div class="profile-tabs">
      <button class="profile-tab ${activeProfileTab==='posts'?'active':''}" data-action="setProfileTab" data-tab="posts">${ICONS.grid} ${escapeHtml(t('postsTab'))}</button>
      ${isYou ? `<button class="profile-tab ${activeProfileTab==='saved'?'active':''}" data-action="setProfileTab" data-tab="saved">${ICONS.saved} ${escapeHtml(t('savedTab'))}</button>` : ''}
    </div>`;
  const gridSource = activeProfileTab==='saved' ? savedPosts : userPosts;
  const gridHtml = gridSource.length ? `<div class="profile-grid">${gridSource.map(p=>`
      <div class="explore-cell" data-action="openPostDetail" data-post-id="${p.id}">
        <img src="${p.image}" loading="lazy">
        <div class="overlay"><span>${ICONS.heartFilled}${(p.likes||[]).length}</span><span>${ICONS.comment}${(p.comments||[]).length}</span></div>
      </div>`).join('')}</div>`
    : `<div class="profile-empty">${ICONS.emptyCam}<div>${activeProfileTab==='saved' ? escapeHtml(t('profileNoSavedTitle')) : escapeHtml(t('profileNoPostsTitle'))}</div></div>`;

  let actionHtml;
  if(isYou){
    actionHtml = `<button class="pill-btn ghost" data-action="openEditProfile">${escapeHtml(t('profileEditBtn'))}</button>`;
  } else {
    actionHtml = `<button class="pill-btn ${isFollowing?'ghost':'primary'}" data-action="toggleFollow" data-uid="${targetUid}">${isFollowing?escapeHtml(t('followingBtn')):escapeHtml(t('followBtn'))}</button>` +
      (isFollowing
        ? `<button class="pill-btn ghost" data-action="openConversationFromProfile" data-uid="${targetUid}">${escapeHtml(t('messageBtn'))}</button>`
        : `<button class="pill-btn disabled-hint" title="${escapeHtml(t('followToChatHint'))}" data-action="hintFollowToChat">${escapeHtml(t('messageBtn'))}</button>`);
  }

  document.getElementById('profileContent').innerHTML = `
    <div class="profile-head">
      <img class="avatar-big" src="${u.avatar}">
      <div class="profile-meta">
        <div class="profile-top-row"><h2>@${escapeHtml(u.username)}</h2>${actionHtml}</div>
        <div class="profile-stats">
          <div><b>${userPosts.length}</b>${escapeHtml(t('profilePostsLabel'))}</div>
          <div><b>${(u.followers||[]).length.toLocaleString()}</b>${escapeHtml(t('profileFollowersLabel'))}</div>
          <div><b>${(u.following||[]).length.toLocaleString()}</b>${escapeHtml(t('profileFollowingLabel'))}</div>
        </div>
        <div class="profile-bio"><b>${escapeHtml(u.name)}</b><div>${escapeHtml(u.bio||'')}</div></div>
      </div>
    </div>
    ${tabsHtml}
    ${gridHtml}`;
}
function hintFollowToChat(){ toast(t('followToChatHint')); }

function openEditProfile(){
  if(!me) return;
  document.getElementById('editAvatarPreview').src = me.avatar;
  document.getElementById('editNameInput').value = me.name;
  document.getElementById('editBioInput').value = me.bio || '';
  document.getElementById('modalEditProfile').classList.remove('hidden');
}
async function saveProfileEdit(){
  if(!me) return;
  const name = document.getElementById('editNameInput').value.trim() || me.name;
  const bio = document.getElementById('editBioInput').value.trim();
  await dbFs.collection('users').doc(me.uid).update({name, bio});
  closeModal(null,'modalEditProfile');
  toast(t('profileUpdated'));
}
function triggerAvatarEdit(){ document.getElementById('editAvatarInput').click(); }

/* ---------------- Create post ---------------- */
function openCreatePost(){
  pendingPostImage = null;
  document.getElementById('postPreviewImg').classList.add('hidden');
  document.getElementById('postUploadZone').classList.remove('hidden');
  document.getElementById('postCaptionInput').value='';
  const btn = document.getElementById('submitPostBtn'); btn.disabled = true;
  document.getElementById('modalCreatePost').classList.remove('hidden');
}
function triggerPostImage(){ document.getElementById('postImageInput').click(); }
async function submitNewPost(){
  if(!pendingPostImage || !me) { toast(t('uploadFirst')); return; }
  const caption = document.getElementById('postCaptionInput').value.trim();
  const btn = document.getElementById('submitPostBtn'); btn.disabled = true;
  try{
    await dbFs.collection('posts').add({
      authorUid: me.uid, authorUsername: me.username, authorName: me.name, authorAvatar: me.avatar,
      image: pendingPostImage, caption, ts: Date.now(), likes: [], comments: []
    });
    closeModal(null,'modalCreatePost');
    toast(t('postPublished'));
  }catch(err){ console.error(err); toast(t('errGeneric')); }
  btn.disabled = false;
}

/* ---------------- Search ---------------- */
function handleSearchInput(value){
  clearTimeout(searchDebounce);
  const box = document.getElementById('searchResults');
  const q = sanitizeUsername(value);
  if(!q){ box.classList.add('hidden'); return; }
  searchDebounce = setTimeout(async ()=>{
    try{
      const snap = await dbFs.collection('users').where('username','>=',q).where('username','<=',q+'\uf8ff').limit(8).get();
      const results = snap.docs.map(d=>d.data()).filter(u=>u.uid !== (me?me.uid:null));
      if(!results.length){ box.innerHTML = `<div class="search-result-item" style="color:var(--db-muted);">${escapeHtml(t('searchNoResults'))}</div>`; }
      else {
        results.forEach(u => userCache[u.uid] = u);
        box.innerHTML = results.map(u=>`<div class="search-result-item" data-action="goProfileFromEl" data-uid="${u.uid}"><img src="${u.avatar}"><div><b style="font-size:13px;">${escapeHtml(u.name)}</b><br><small style="color:var(--db-muted);">@${escapeHtml(u.username)}</small></div></div>`).join('');
      }
      box.classList.remove('hidden');
    }catch(err){ console.error(err); }
  }, 280);
}

/* ---------------- Stories (own quick-add only, demo) ---------------- */
function openOwnStoryOrAdd(){ toast('💙'); }

/* ---------------- Modal generic ---------------- */
function closeModal(e, modalId){ document.getElementById(modalId).classList.add('hidden'); }
function closeOnOverlay(e, modalId, targetEl){ if(targetEl.id === modalId) closeModal(e, modalId); }

/* ---------------- Event delegation ---------------- */
function attachGlobalListeners(){
  document.addEventListener('click', e => {
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;
    const postId = el.dataset.postId;
    const uidAttr = el.dataset.uid;
    switch(action){
      case 'goPage': goPage(el.dataset.page, uidAttr); break;
      case 'openCreatePost': openCreatePost(); break;
      case 'closeModal': closeModal(e, el.dataset.modal); break;
      case 'closeOnOverlay': closeOnOverlay(e, el.dataset.modal, e.target); break;
      case 'toggleLike': toggleLike(postId); break;
      case 'toggleSave': toggleSave(postId); break;
      case 'likeBurst': likeBurst(postId); break;
      case 'focusComment': focusComment(postId); break;
      case 'submitComment': submitComment(postId, false); break;
      case 'submitCommentDetail': submitComment(postId, true); break;
      case 'shareToast': shareToast(); break;
      case 'openPostDetail': openPostDetail(postId); break;
      case 'goProfileFromEl': goProfileFromEl(uidAttr); break;
      case 'toggleFollow': toggleFollow(uidAttr); break;
      case 'hintFollowToChat': hintFollowToChat(); break;
      case 'setProfileTab': setProfileTab(el.dataset.tab); break;
      case 'openEditProfile': openEditProfile(); break;
      case 'saveProfileEdit': saveProfileEdit(); break;
      case 'triggerAvatarEdit': triggerAvatarEdit(); break;
      case 'triggerPostImage': triggerPostImage(); break;
      case 'submitNewPost': submitNewPost(); break;
      case 'openConversation': openConversation(uidAttr); break;
      case 'openConversationFromProfile': openConversationFromProfile(uidAttr); break;
      case 'backToConvList': backToConvList(); break;
      case 'sendMessage': sendMessage(); break;
      case 'logout': logout(); break;
      case 'showSignup': showSignup(); break;
      case 'showLogin': showLogin(); break;
      case 'doLogin': doLogin(); break;
      case 'doSignup': doSignup(); break;
      case 'triggerSignupAvatarUpload': document.getElementById('avatarUploadInput').click(); break;
      case 'pickLanguage': pickLanguage(el.dataset.lang); break;
      case 'confirmLanguage': confirmLanguage(); break;
      case 'openLangFromAuth': openLangFromAuth(); break;
      case 'openSettings': openSettings(); break;
    }
  });

  document.addEventListener('click', e => {
    const pick = e.target.closest('.avatar-pick[data-avatar-choice]');
    if(pick){
      document.querySelectorAll('.avatar-pick').forEach(p=>p.classList.remove('selected'));
      pick.classList.add('selected');
      document.getElementById('avatarPickRow').dataset.selected = pick.dataset.avatarChoice;
    }
  });

  document.addEventListener('input', e => {
    if(e.target.id === 'searchInput') handleSearchInput(e.target.value);
  });

  document.addEventListener('keydown', e => {
    if(e.key === 'Enter' && e.target.matches('[data-comment-input]')){
      const postId = e.target.dataset.postId;
      const inDetail = !!e.target.closest('#postDetailBox');
      submitComment(postId, inDetail);
    }
    if(e.key === 'Enter' && e.target.id === 'loginPassword') doLogin();
  });

  document.getElementById('postImageInput').addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    resizeImageFile(file, 720, 0.65, dataUrl => {
      pendingPostImage = dataUrl;
      document.getElementById('postPreviewImg').src = dataUrl;
      document.getElementById('postPreviewImg').classList.remove('hidden');
      document.getElementById('postUploadZone').classList.add('hidden');
      document.getElementById('submitPostBtn').disabled = false;
    });
  });
  document.getElementById('avatarUploadInput').addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file) return;
    resizeImageFile(file, 360, 0.8, dataUrl=>{
      document.querySelectorAll('.avatar-pick').forEach(p=>p.classList.remove('selected'));
      document.getElementById('avatarPickRow').dataset.selected = dataUrl;
      toast('✔');
    });
  });
  document.getElementById('editAvatarInput').addEventListener('change', e=>{
    const file = e.target.files[0]; if(!file || !me) return;
    resizeImageFile(file, 360, 0.8, async dataUrl=>{
      document.getElementById('editAvatarPreview').src = dataUrl;
      await dbFs.collection('users').doc(me.uid).update({avatar: dataUrl});
    });
  });

  document.addEventListener('click', e=>{
    if(!e.target.closest('.search-wrap')) document.getElementById('searchResults').classList.add('hidden');
  });
}
</script>
</body>
</html>
